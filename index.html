<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <!-- A1: title + description ─────────────────────────────────────────────
       Lead with Chinese (primary audience), trail with English (AI crawlers).
       Tribe names are listed explicitly so LLMs index them as named entities. -->
  <title>豐年祭地圖 · 全臺原住民族祭儀曆 2026</title>
  <meta name="description" content="全臺唯一原住民族歲時祭儀彙整地圖。涵蓋阿美族（Pangcah）Ilisin、布農族射耳祭、太魯閣族、卑南族、排灣族等 16 族祭典，花蓮、臺東、屏東等各縣市部落。Taiwan indigenous festival calendar — Amis Ilisin, Bunun Malahtangia, and more." />

  <!-- PWA manifest + icons -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#bf7e1a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="豐年祭地圖" />
  <link rel="icon" type="image/png" href="logo.png" />
  <link rel="apple-touch-icon" href="logo.png" />

  <!-- A3: canonical + hreflang ─────────────────────────────────────────────
       Canonical prevents duplicate-content penalties if the URL appears with
       query strings. hreflang tells search engines zh-TW is the primary locale. -->
  <link rel="canonical" href="https://ilisin.tw/" />
  <link rel="alternate" hreflang="zh-TW"    href="https://ilisin.tw/" />
  <link rel="alternate" hreflang="x-default" href="https://ilisin.tw/" />

  <!-- A2: Open Graph + Twitter Card ───────────────────────────────────────
       These tags control the preview card shown when this URL is shared on
       LINE, Facebook, Discord, iMessage, etc. Without them the platform
       generates a generic (often broken) preview from the page body.
       twitter:card=summary_large_image also applies to many non-Twitter
       platforms that adopted the same spec (Slack, Telegram, etc.). -->
  <meta property="og:type"        content="website" />
  <meta property="og:url"         content="https://ilisin.tw/" />
  <meta property="og:title"       content="豐年祭地圖 · 全臺原住民族祭儀曆 2026" />
  <meta property="og:description" content="全臺第一個原住民族祭儀彙整地圖，涵蓋 16 族、各縣市部落。" />
  <meta property="og:locale"      content="zh_TW" />
  <!-- TODO og-image.png MISSING ── og:image is the thumbnail image shown in
       the share preview card (ideal size: 1200×630 px). Create og-image.png:
       the millet logo centred on an amber (#bf7e1a) background with the text
       "豐年祭地圖 2026". Drop the file at the repo root and this tag activates. -->
  <meta property="og:image"       content="https://ilisin.tw/og-image.png" />
  <meta name="twitter:card"       content="summary_large_image" />

  <!-- Analytics -->
  <script defer src="https://umami-ten-mocha.vercel.app/script.js" data-website-id="b5edce61-5f7b-48f8-b077-53eeed267361"></script>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,300..400&family=Noto+Serif+TC:wght@300;400;600;700&family=Courier+Prime&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="app.css" />
</head>
<body class="tab-timeline">

<!-- Phase C prerender hook: scripts/prerender.js injects static festival HTML here
     at build time. Visible to crawlers; hidden by js-ready CSS rule once JS loads. -->
<main id="festival-data" aria-label="靜態祭儀資料" aria-hidden="true"></main>

<header class="app-header">
  <div class="header-left">
    <img src="logo.png" alt="Ilisin" class="logo-img" />
    <span class="header-title">Ilisin</span>
  </div>
  <div class="header-right">
    <button class="theme-btn" id="themeBtn" data-theme-btn aria-label="切換主題"></button>
    <button class="install-btn" id="installBtn" hidden>安裝</button>
  </div>
</header>

<nav class="sidebar" id="sidebar" aria-label="主要導覽">
  <div class="sb-logo-block">
    <img src="logo.png" alt="Ilisin" class="sb-logo" />
    <span class="sb-appname">Ilisin</span>
  </div>
  <div class="sb-nav">
    <button class="sb-link active" data-tab="timeline">
      <span class="sb-link-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none"><rect x="3" y="4" width="18" height="17" rx="2.5" stroke="currentColor" stroke-width="1.5"/><line x1="3" y1="9" x2="21" y2="9" stroke="currentColor" stroke-width="1.5"/></svg></span>
      時間軸
    </button>
    <button class="sb-link" data-tab="map">
      <span class="sb-link-icon"><svg width="16" height="16" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="5.5" r="3.5" stroke="currentColor" stroke-width="1.5"/><circle cx="7" cy="5.5" r="1.5" fill="currentColor"/><path d="M7 9v4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></span>
      地圖
    </button>
    <button class="sb-link" data-tab="search">
      <span class="sb-link-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none"><circle cx="10.5" cy="10.5" r="6.5" stroke="currentColor" stroke-width="1.5"/><path d="M16 16L21 21" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></span>
      搜尋
    </button>
    <button class="sb-link" data-tab="info">
      <span class="sb-link-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.5"/><path d="M12 11v7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><circle cx="12" cy="7.5" r="1.2" fill="currentColor"/></svg></span>
      關於
    </button>
  </div>
  <div class="sb-footer">
    <button class="theme-btn" data-theme-btn aria-label="切換主題"></button>
  </div>
</nav>

<!-- ── Timeline panel ── -->
<div class="panel active" id="panel-timeline">
  <div class="tl-month-tabs" id="tlMonthTabs"></div>
  <div class="tl-week-nav">
    <button class="tl-nav-btn" id="tlNavPrev">‹</button>
    <span class="tl-nav-label" id="tlNavLabel"></span>
    <button class="tl-nav-btn" id="tlNavNext">›</button>
  </div>
  <div class="tl-strip-scroll" id="tlStripScroll"></div>
  <div class="tl-county" id="tlCounty">
    <button class="tl-chip active" data-county="all">全部</button>
    <button class="tl-chip" data-county="花蓮縣">花蓮</button>
    <button class="tl-chip" data-county="臺東縣">臺東</button>
  </div>
  <div class="tl-day-list" id="tlDayList"></div>
</div>

<!-- ── Map panel ── -->
<div class="panel" id="panel-map">
  <div id="map"></div>
  <div class="map-chips" id="mapCountyChips">
    <button class="map-chip active" data-county="all">全部</button>
    <button class="map-chip" data-county="花蓮縣">花蓮</button>
    <button class="map-chip" data-county="臺東縣">臺東</button>
  </div>
  <div class="bs" id="bottomSheet" data-state="collapsed">
    <div class="bs-handle-bar" id="bsHandleBar">
      <div class="bs-handle-pill"></div>
      <button class="bs-close-btn" id="bsCloseBtn" aria-label="關閉">✕</button>
    </div>
    <div class="bs-pills-row" id="bsPills"></div>
    <div class="bs-content" id="bsContent"></div>
  </div>
</div>

<!-- ── Search panel ── -->
<div class="panel" id="panel-search">
  <div class="sr-input-row">
    <span class="sr-icon">○</span>
    <input type="text" class="sr-input" id="srInput" placeholder="搜尋部落、鄉鎮、場地…" autocomplete="off" />
    <button class="sr-clear" id="srClear" hidden aria-label="清除">✕</button>
  </div>
  <div class="sr-chips" id="srChips">
    <button class="sr-chip" data-filter="week">本週</button>
    <button class="sr-chip" data-filter="hualien">花蓮</button>
    <button class="sr-chip" data-filter="taitung">臺東</button>
    <button class="sr-chip" data-filter="taitung-city">臺東市</button>
    <button class="sr-chip" data-filter="confirmed">已公告</button>
  </div>
  <div class="sr-results" id="srResults">
    <div class="sr-hint">輸入部落名稱或選擇篩選條件</div>
  </div>
</div>

<!-- ── Info panel ── -->
<div class="panel" id="panel-info">
  <div class="info-wrap">

    <div class="info-logo-block">
      <img src="logo.png" alt="Ilisin" class="info-logo" />
      <div class="info-appname">豐年祭地圖</div>
      <div class="info-appsub">ILISIN MAP 2026</div>
    </div>

    <div class="info-tiles" id="infoTiles"></div>

    <div class="info-section-title" style="margin-top:.25rem">臺東資料說明</div>
    <div class="info-warn">
      <div class="info-warn-title">⚠ 注意</div>
      <div class="info-warn-body">臺東縣部分部落以社群媒體公告為主，日期可能異動，請以各部落公告為準。正式出行前務必透過部落或公所管道再確認。</div>
    </div>

    <div class="info-warn" id="coverageBox" style="display:none">
      <div class="info-warn-title">📋 協助回報</div>
      <div class="info-warn-body" id="coverageBoxBody"></div>
    </div>

    <div class="contrib-cta-row">
      <button class="contrib-cta" onclick="openContrib('report')">回報錯誤</button>
      <button class="contrib-cta" onclick="openContrib('new')">新增部落</button>
    </div>

    <div class="info-section-title">資料來源</div>
    <div class="info-sources" id="infoSources"></div>

    <div class="info-section-title">關於本站</div>
    <div class="info-about-body">豐年祭地圖整合花蓮、臺東兩縣 2026 年度阿美族豐年祭（Ilisin）資訊，以地圖與時間軸呈現各部落祭典日期與地點。資料來自縣府公告及部落自主發布，由志願者整理維護，持續更新中。</div>

    <details class="contrib-details" id="contribDetails">
      <summary class="contrib-summary">
        <span class="info-section-title" style="margin-bottom:0">回報 · 貢獻</span>
        <span class="contrib-chevron">▶</span>
      </summary>
      <div class="contrib-body">

        <div class="contrib-tabs">
          <button class="contrib-tab active" data-ctab="report">回報錯誤</button>
          <button class="contrib-tab" data-ctab="new">新增部落</button>
        </div>

        <!-- Report error -->
        <form class="contrib-form active" id="formReport" novalidate>
          <div class="form-field">
            <label class="form-label">部落<span class="req">*</span></label>
            <select class="form-select" id="rVillage" required>
              <option value="">— 選擇部落 —</option>
            </select>
          </div>
          <div class="form-field">
            <label class="form-label">問題類型<span class="req">*</span></label>
            <div class="form-radio-group" id="rIssueGroup">
              <label class="form-radio-label"><input type="radio" name="rIssue" value="日期有誤" required>日期有誤</label>
              <label class="form-radio-label"><input type="radio" name="rIssue" value="已取消">已取消</label>
              <label class="form-radio-label"><input type="radio" name="rIssue" value="場地更新">場地更新</label>
              <label class="form-radio-label"><input type="radio" name="rIssue" value="其他">其他</label>
            </div>
          </div>
          <div class="form-field form-conditional" id="rUpdateWrap">
            <label class="form-label" id="rUpdateLabel">更新後資訊</label>
            <input class="form-input" id="rUpdate" type="text" placeholder="例：8/15 六 或 文化活動中心">
          </div>
          <div class="form-field">
            <label class="form-label">來源網址</label>
            <input class="form-input" id="rSource" type="url" placeholder="https://…">
          </div>
          <div class="form-field">
            <label class="form-label">備註</label>
            <textarea class="form-textarea" id="rNote" placeholder="其他補充說明…"></textarea>
          </div>
          <div class="form-status" id="rStatus"></div>
          <button class="form-submit" id="rSubmit" type="button" onclick="submitReport()">送出回報</button>
        </form>

        <!-- New village -->
        <form class="contrib-form" id="formNew" novalidate>
          <div class="form-field">
            <label class="form-label">中文名稱<span class="req">*</span></label>
            <input class="form-input" id="nChinese" type="text" placeholder="例：康樂部落" required list="nChineseSuggest">
            <datalist id="nChineseSuggest"></datalist>
          </div>
          <div class="form-field">
            <label class="form-label">Amis 名稱</label>
            <input class="form-input" id="nAmis" type="text" placeholder="例：Palamitan">
          </div>
          <div style="display:flex;gap:.6rem">
            <div class="form-field" style="flex:1">
              <label class="form-label">縣市<span class="req">*</span></label>
              <select class="form-select" id="nCounty" required onchange="cascadeTownship()">
                <option value="">— 選擇 —</option>
              </select>
            </div>
            <div class="form-field" style="flex:1">
              <label class="form-label">鄉鎮<span class="req">*</span></label>
              <select class="form-select" id="nTownship" required>
                <option value="">— 先選縣市 —</option>
              </select>
            </div>
          </div>
          <div class="form-field">
            <label class="form-label">日期<span class="req">*</span></label>
            <input class="form-input" id="nDate" type="text" placeholder="例：8/15 六 或 7/3 五–7/11 六" required>
          </div>
          <div class="form-field">
            <label class="form-label">場地</label>
            <input class="form-input" id="nVenue" type="text" placeholder="例：部落聚會所">
          </div>
          <div class="form-field">
            <label class="form-label">來源網址</label>
            <input class="form-input" id="nSource" type="url" placeholder="https://…">
          </div>
          <div class="form-field">
            <label class="form-label">備註</label>
            <textarea class="form-textarea" id="nNote" placeholder="其他補充說明…"></textarea>
          </div>
          <div class="form-status" id="nStatus"></div>
          <button class="form-submit" id="nSubmit" type="button" onclick="submitNew()">送出新增</button>
        </form>

      </div>
    </details>

    <a href="viz.html" style="color:var(--bg);font-size:.5rem;text-decoration:none;display:block;margin-top:2rem;user-select:none;" tabindex="-1" aria-hidden="true">·</a>

  </div>
</div>

<!-- ── Tab bar ── -->
<nav class="tab-bar" aria-label="主要功能">
  <button class="tab-btn active" data-tab="timeline">
    <span class="tab-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none"><rect x="3" y="4" width="18" height="17" rx="2.5" stroke="currentColor" stroke-width="1.5"/><line x1="3" y1="9" x2="21" y2="9" stroke="currentColor" stroke-width="1.5"/></svg></span>
    <span class="tab-label">行事曆</span>
  </button>
  <button class="tab-btn" data-tab="map">
    <span class="tab-icon"><svg width="22" height="22" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="5.5" r="3.5" stroke="currentColor" stroke-width="1.5"/><circle cx="7" cy="5.5" r="1.5" fill="currentColor"/><path d="M7 9v4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></span>
    <span class="tab-label">地圖</span>
  </button>
  <button class="tab-btn" data-tab="search">
    <span class="tab-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none"><circle cx="10.5" cy="10.5" r="6.5" stroke="currentColor" stroke-width="1.5"/><path d="M16 16L21 21" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></span>
    <span class="tab-label">搜尋</span>
  </button>
  <button class="tab-btn" data-tab="info">
    <span class="tab-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.5"/><path d="M12 11v7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><circle cx="12" cy="7.5" r="1.2" fill="currentColor"/></svg></span>
    <span class="tab-label">關於</span>
  </button>
</nav>

<!-- Script load order:
     1. Leaflet (map lib)
     2. MarkerCluster (Leaflet plugin)
     3. data.js — VILLAGES, SOURCES, DATA_NOTE
     4. buluo-ref.js — BULUO_REF, BULUO_UNCOVERED
     5. Tab files — set up listeners; call shared utils only at runtime (safe)
     6. app.js — defines shared utils, theme, tab switching, boots with initTimeline() -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script src="data.js"></script>
<script src="buluo-ref.js"></script>
<script src="js/timeline.js"></script>
<script src="js/map.js"></script>
<script src="js/search.js"></script>
<script src="js/info.js"></script>
<script src="app.js"></script>
</body>
</html>
