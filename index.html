<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>豐年祭地圖 · Ilisin 2026</title>
  <meta name="description" content="2026 花東阿美族（Pangcah）豐年祭歲時祭儀部落地圖 · 147 部落 · 花蓮縣完整版" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#bf7e1a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Ilisin" />
  <link rel="apple-touch-icon" href="logo.jpeg" />

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,300..400&family=Noto+Serif+TC:wght@300;400;600;700&family=Courier+Prime&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg:         #f0ead8;
      --bg-alt:     #e8e0c8;
      --surface:    #faf6ee;
      --amber:      #bf7e1a;
      --amber-pale: #f2d48c;
      --amber-dark: #7a4e0a;
      --terra:      #9c3e18;
      --terra-pale: #e8b898;
      --green:      #3a7a3a;
      --text-1:     #1c1508;
      --text-2:     #5a4325;
      --text-3:     #9c845a;
      --border:     #ddd0b0;
      --border-2:   #c4ac80;
      --header-h:   54px;
      --r:          4px;
      --mono: 'Courier Prime', 'Courier New', monospace;
      --cn:   'Noto Serif TC', serif;
      --disp: 'Fraunces', Georgia, serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; -webkit-text-size-adjust: 100%; }
    body { font-family: var(--cn); background: var(--bg); color: var(--text-1); line-height: 1.6; -webkit-font-smoothing: antialiased; }

    /* ── Header ── */
    .site-header {
      position: fixed; inset: 0 0 auto 0;
      height: var(--header-h);
      background: var(--bg); border-bottom: 1px solid var(--border);
      z-index: 1000; display: flex; align-items: center;
      justify-content: space-between; padding: 0 1rem; gap: .75rem;
    }
    .header-left { display: flex; align-items: baseline; gap: .5rem; }
    .logo-img { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; flex-shrink: 0; }
    .header-title { font-family: var(--disp); font-size: 1.2rem; font-weight: 600; letter-spacing: -.02em; white-space: nowrap; }
    .header-sub { font-family: var(--mono); font-size: .58rem; color: var(--text-3); letter-spacing: .09em; text-transform: uppercase; display: none; }
    @media (min-width: 420px) { .header-sub { display: block; } }
    .header-count { font-family: var(--mono); font-size: .6rem; color: var(--text-3); }
    .install-btn { font-family: var(--mono); font-size: .62rem; letter-spacing: .07em; text-transform: uppercase; color: var(--amber); border: 1px solid var(--amber); background: transparent; padding: 3px 8px; border-radius: var(--r); cursor: pointer; white-space: nowrap; transition: background .15s, color .15s; }
    .install-btn:hover { background: var(--amber); color: #fff; }

    /* ── Layout ── */
    .app-body { padding-top: var(--header-h); }
    .app-layout { display: flex; flex-direction: column; }

    /* ── Map ── */
    .map-panel { position: sticky; top: var(--header-h); height: 42vh; min-height: 180px; max-height: 320px; z-index: 100; border-bottom: 2px solid var(--border-2); flex-shrink: 0; }
    #map { height: 100%; width: 100%; }

    /* ── Info panel ── */
    .info-panel { padding: 1.25rem .9rem 5rem; }

    /* ── Section label ── */
    .section-label { font-family: var(--mono); font-size: .58rem; text-transform: uppercase; letter-spacing: .14em; color: var(--text-3); margin-bottom: .65rem; padding-bottom: .35rem; border-bottom: 1px solid var(--border); }

    /* ── Notes ── */
    .notes-section { margin-bottom: 1.75rem; }
    .notes-grid { display: grid; grid-template-columns: 1fr; gap: .5rem; }
    @media (min-width: 400px) { .notes-grid { grid-template-columns: 1fr 1fr; } }
    .note-item { display: flex; gap: .5rem; align-items: flex-start; padding: .55rem .7rem; background: var(--surface); border-radius: var(--r); border: 1px solid var(--border); }
    .note-icon { font-family: var(--mono); font-size: .82rem; color: var(--amber); flex-shrink: 0; line-height: 1.4; }
    .note-label { font-family: var(--mono); font-size: .58rem; text-transform: uppercase; letter-spacing: .07em; color: var(--amber-dark); margin-bottom: .1rem; }
    .note-text { font-size: .74rem; color: var(--text-2); line-height: 1.5; }

    /* ── Data note ── */
    .data-note { font-family: var(--mono); font-size: .62rem; color: var(--text-3); line-height: 1.55; padding: .6rem .75rem; background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); margin-bottom: 1.25rem; }

    /* ── Filters ── */
    .filters { display: flex; gap: .4rem; flex-wrap: wrap; margin-bottom: 1rem; }
    .filter-btn { font-family: var(--mono); font-size: .6rem; letter-spacing: .07em; text-transform: uppercase; padding: 3px 9px; border-radius: 99px; border: 1px solid var(--border); background: var(--surface); color: var(--text-3); cursor: pointer; transition: background .12s, color .12s, border-color .12s; }
    .filter-btn:hover { border-color: var(--amber); color: var(--amber-dark); }
    .filter-btn.active { background: var(--amber); border-color: var(--amber); color: #fff; }
    .filter-btn[data-f="tbd"].active { background: var(--text-3); border-color: var(--text-3); }
    .filter-btn[data-f="cancelled"].active { background: #aaa; border-color: #aaa; }

    /* ── Township groups ── */
    .township-group { margin-bottom: .5rem; border: 1px solid var(--border); border-radius: var(--r); overflow: hidden; }
    .township-summary { display: flex; align-items: center; justify-content: space-between; padding: .5rem .8rem; background: var(--bg-alt); cursor: pointer; list-style: none; user-select: none; gap: .5rem; }
    .township-summary::-webkit-details-marker { display: none; }
    .township-summary:hover { background: #ddd5b8; }
    .ts-name { font-family: var(--cn); font-size: .88rem; font-weight: 600; }
    .ts-meta { display: flex; align-items: center; gap: .5rem; }
    .ts-count { font-family: var(--mono); font-size: .58rem; color: var(--text-3); }
    .ts-dates { font-family: var(--mono); font-size: .58rem; color: var(--amber-dark); }
    .ts-chevron { font-size: .7rem; color: var(--text-3); transition: transform .15s; }
    details[open] .ts-chevron { transform: rotate(90deg); }

    .cards-in-group { display: flex; flex-direction: column; }

    /* ── Village card ── */
    .village-card {
      padding: .6rem .85rem;
      border-left: 3px solid transparent;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: border-left-color .15s, background .15s;
      scroll-margin-top: calc(var(--header-h) + 44vh + 8px);
      display: flex; gap: .6rem; align-items: flex-start;
    }
    .village-card:last-child { border-bottom: none; }
    .village-card:hover { border-left-color: var(--amber-pale); background: #fdf9ef; }
    .village-card.active { border-left-color: var(--amber); background: #fffbf0; }
    .village-card.hidden { display: none; }

    .card-status-dot { flex-shrink: 0; width: 8px; height: 8px; border-radius: 50%; margin-top: 5px; }
    .card-status-dot.confirmed { background: var(--green); }
    .card-status-dot.tbd { background: var(--text-3); }
    .card-status-dot.cancelled { background: #bbb; }

    .card-body { flex: 1; min-width: 0; }
    .card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: .5rem; }
    .card-names { flex: 1; min-width: 0; }
    .card-chinese { font-family: var(--cn); font-size: .95rem; font-weight: 600; line-height: 1.25; }
    .card-amis { font-family: var(--mono); font-size: .6rem; color: var(--terra); letter-spacing: .03em; display: block; margin-top: 1px; }
    .card-date { font-family: var(--mono); font-size: .68rem; color: var(--amber-dark); font-weight: 700; white-space: nowrap; text-align: right; }
    .card-cancelled .card-date { color: #aaa; text-decoration: line-through; }
    .card-tbd .card-date { color: var(--text-3); }
    .card-venue { font-size: .72rem; color: var(--text-2); margin-top: .15rem; }
    .card-footer { margin-top: .3rem; }
    .card-source { font-family: var(--mono); font-size: .58rem; color: var(--text-3); text-decoration: none; }
    .card-source:hover { color: var(--amber); text-decoration: underline; }

    /* ── Leaflet overrides ── */
    .leaflet-container { background: var(--bg-alt); }
    .leaflet-popup-content-wrapper { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); box-shadow: 0 2px 10px rgba(0,0,0,.14); color: var(--text-1); }
    .leaflet-popup-tip { background: var(--surface); }
    .leaflet-popup-content { margin: .55rem .8rem !important; line-height: 1.4; }
    .popup-cn { font-family: var(--cn); font-size: .88rem; font-weight: 600; display: block; }
    .popup-sub { font-family: var(--mono); font-size: .6rem; color: var(--text-2); display: block; }
    .popup-date { font-family: var(--mono); font-size: .62rem; color: var(--amber-dark); font-weight: 700; margin-top: .15rem; display: block; }
    .leaflet-control-zoom a { color: var(--text-2) !important; background: var(--surface) !important; border-color: var(--border) !important; }
    /* Cluster styles */
    .marker-cluster-small, .marker-cluster-medium, .marker-cluster-large { background-color: rgba(191,126,26,.25) !important; }
    .marker-cluster-small div, .marker-cluster-medium div, .marker-cluster-large div { background-color: rgba(191,126,26,.7) !important; color: #fff !important; font-family: var(--mono) !important; font-size: .65rem !important; }

    /* ── Desktop ── */
    @media (min-width: 768px) {
      body { overflow: hidden; }
      .app-layout { flex-direction: row; height: calc(100vh - var(--header-h)); }
      .map-panel { position: static; flex: 0 0 44%; height: 100%; max-height: none; min-height: 0; border-bottom: none; border-right: 2px solid var(--border-2); }
      .info-panel-wrapper { flex: 1; overflow-y: auto; height: 100%; -webkit-overflow-scrolling: touch; scrollbar-width: thin; scrollbar-color: var(--border-2) var(--bg); }
      .info-panel-wrapper::-webkit-scrollbar { width: 4px; }
      .info-panel-wrapper::-webkit-scrollbar-track { background: var(--bg); }
      .info-panel-wrapper::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 2px; }
      .info-panel { padding: 1.5rem 1.25rem 5rem; }
      .village-card { scroll-margin-top: 1rem; }
    }
  </style>
</head>
<body>

<header class="site-header">
  <div class="header-left">
    <img src="logo.jpeg" alt="Ilisin" class="logo-img" />
    <span class="header-title">豐年祭地圖</span>
    <span class="header-sub">Ilisin 2026 · Pangcah</span>
  </div>
  <div style="display:flex;align-items:center;gap:.6rem">
    <span class="header-count" id="headerCount"></span>
    <button class="install-btn" id="installBtn" hidden>安裝</button>
  </div>
</header>

<div class="app-body">
  <div class="app-layout" id="appLayout">

    <div class="map-panel">
      <div id="map"></div>
    </div>

    <div class="info-panel-wrapper" id="infoPanelWrapper">
      <div class="info-panel">

        <section class="notes-section">
          <h2 class="section-label">重要資訊 · Key Notes</h2>
          <div class="notes-grid" id="notesGrid"></div>
        </section>

        <div class="data-note" id="dataNoteEl"></div>

        <section>
          <h2 class="section-label">部落 · Villages</h2>
          <div class="filters" id="filters">
            <button class="filter-btn active" data-f="all">全部</button>
            <button class="filter-btn" data-f="confirmed">● 已公告</button>
            <button class="filter-btn" data-f="tbd">○ 未定</button>
            <button class="filter-btn" data-f="cancelled">✕ 停辦</button>
          </div>
          <div id="groupsList"></div>
        </section>

      </div>
    </div>

  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script src="data.js"></script>
<script>
/* ── Layout ─────────────────────────────────────── */
function applyLayout() {
  document.body.style.overflow = window.innerWidth >= 768 ? 'hidden' : '';
}
applyLayout();
window.addEventListener('resize', applyLayout);

/* ── Map ─────────────────────────────────────────── */
let leafletMap, clusterGroup;
const markers = {};
let activeId = null;

function makeIcon(v, active) {
  const col = active ? '#9c3e18'
    : v.status === 'cancelled' ? '#bbb'
    : v.status === 'tbd' ? '#9c845a'
    : '#bf7e1a';
  const sz = active ? 14 : 10;
  const outer = sz + 8;
  return L.divIcon({
    className: '',
    html: `<div style="display:flex;align-items:center;justify-content:center;width:${outer}px;height:${outer}px"><div style="width:${sz}px;height:${sz}px;border-radius:50%;background:${col};border:2px solid rgba(255,251,240,.9);box-shadow:0 1px 5px rgba(0,0,0,.28);${active ? 'transform:scale(1.3);' : ''}"></div></div>`,
    iconSize: [outer, outer],
    iconAnchor: [outer / 2, outer / 2],
    popupAnchor: [0, -(sz / 2 + 4)]
  });
}

function initMap() {
  leafletMap = L.map('map', { center: [23.35, 121.32], zoom: 9, zoomControl: true });
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    attribution: '© <a href="https://carto.com/">CARTO</a> © <a href="https://www.openstreetmap.org/copyright">OSM</a>',
    subdomains: 'abcd', maxZoom: 19
  }).addTo(leafletMap);

  clusterGroup = L.markerClusterGroup({
    maxClusterRadius: 40,
    spiderfyOnMaxZoom: true,
    showCoverageOnHover: false
  });

  VILLAGES.forEach(v => {
    const m = L.marker([v.lat, v.lng], { icon: makeIcon(v, false) })
      .bindPopup(
        `<span class="popup-cn">${v.chinese}</span>` +
        `<span class="popup-sub">${v.amis ? v.amis + ' · ' : ''}${v.township}</span>` +
        `<span class="popup-date">${v.date}</span>`,
        { closeButton: false, maxWidth: 200 }
      );
    m.on('click', () => activateVillage(v.id));
    clusterGroup.addLayer(m);
    markers[v.id] = m;
  });

  leafletMap.addLayer(clusterGroup);
}

/* ── Activate ────────────────────────────────────── */
function activateVillage(id) {
  if (activeId) {
    const prev = VILLAGES.find(v => v.id === activeId);
    if (prev) markers[activeId]?.setIcon(makeIcon(prev, false));
    document.getElementById('card-' + activeId)?.classList.remove('active');
    markers[activeId]?.closePopup();
  }
  activeId = id;
  const v = VILLAGES.find(v => v.id === id);
  if (!v) return;

  markers[id]?.setIcon(makeIcon(v, true));
  leafletMap.panTo([v.lat, v.lng], { animate: true, duration: 0.4 });
  markers[id]?.openPopup();

  const card = document.getElementById('card-' + id);
  if (card) {
    // Open parent details if closed
    const det = card.closest('details');
    if (det && !det.open) det.open = true;
    card.classList.add('active');
    setTimeout(() => {
      const isDesktop = window.innerWidth >= 768;
      if (isDesktop) {
        const wrapper = document.getElementById('infoPanelWrapper');
        const off = card.getBoundingClientRect().top - wrapper.getBoundingClientRect().top - 12;
        wrapper.scrollBy({ top: off, behavior: 'smooth' });
      } else {
        const hh = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--header-h'));
        const mh = document.querySelector('.map-panel').offsetHeight;
        window.scrollTo({ top: card.getBoundingClientRect().top + window.scrollY - hh - mh - 8, behavior: 'smooth' });
      }
    }, 80);
  }
}

/* ── Render notes ────────────────────────────────── */
function renderNotes() {
  document.getElementById('notesGrid').innerHTML = GENERAL_NOTES.map(n =>
    `<div class="note-item"><span class="note-icon">${n.icon}</span><div><div class="note-label">${n.label}</div><div class="note-text">${n.text}</div></div></div>`
  ).join('');
  document.getElementById('dataNoteEl').textContent = DATA_NOTE;
}

/* ── Render villages ─────────────────────────────── */
function renderVillages() {
  // Group by county → township (preserve order from VILLAGES array)
  const groups = [];
  const seen = {};
  VILLAGES.forEach(v => {
    const key = v.county + '|' + v.township;
    if (!seen[key]) { seen[key] = groups.length; groups.push({ county: v.county, township: v.township, villages: [] }); }
    groups[seen[key]].villages.push(v);
  });

  const total = VILLAGES.length;
  document.getElementById('headerCount').textContent = total + ' 部落';

  document.getElementById('groupsList').innerHTML = groups.map(g => {
    const dates = [...new Set(g.villages.filter(v => v.status === 'confirmed').map(v => v.date.split('–')[0].split('（')[0].trim()))].slice(0, 3).join('、');
    const confirmed = g.villages.filter(v => v.status === 'confirmed').length;
    const cards = g.villages.map(v => `
      <div class="village-card card-${v.status}" id="card-${v.id}" onclick="activateVillage('${v.id}')">
        <div class="card-status-dot ${v.status}"></div>
        <div class="card-body">
          <div class="card-top">
            <div class="card-names">
              <span class="card-chinese">${v.chinese}</span>
              ${v.amis ? `<span class="card-amis">${v.amis}</span>` : ''}
            </div>
            <span class="card-date">${v.date}</span>
          </div>
          ${v.venue && v.venue !== '—' ? `<div class="card-venue">${v.venue}</div>` : ''}
          <div class="card-footer">
            <a class="card-source" href="${SOURCES[v.src].url}" target="_blank" rel="noopener" onclick="event.stopPropagation()">↗ ${SOURCES[v.src].label}</a>
          </div>
        </div>
      </div>`).join('');

    return `
      <details class="township-group" open>
        <summary class="township-summary">
          <span class="ts-name">${g.county === '臺東縣' ? '臺東 · ' : '花蓮 · '}${g.township}</span>
          <span class="ts-meta">
            ${dates ? `<span class="ts-dates">${dates}${dates && confirmed < g.villages.length ? '…' : ''}</span>` : ''}
            <span class="ts-count">${g.villages.length} 部落</span>
            <span class="ts-chevron">›</span>
          </span>
        </summary>
        <div class="cards-in-group">${cards}</div>
      </details>`;
  }).join('');
}

/* ── Filter ──────────────────────────────────────── */
let currentFilter = 'all';
document.getElementById('filters').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  currentFilter = btn.dataset.f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b === btn));
  document.querySelectorAll('.village-card').forEach(card => {
    const show = currentFilter === 'all' || card.classList.contains('card-' + currentFilter);
    card.classList.toggle('hidden', !show);
  });
  // Hide empty groups
  document.querySelectorAll('.township-group').forEach(g => {
    const visible = [...g.querySelectorAll('.village-card')].some(c => !c.classList.contains('hidden'));
    g.style.display = visible ? '' : 'none';
  });
});

/* ── PWA ─────────────────────────────────────────── */
let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', e => { e.preventDefault(); deferredPrompt = e; document.getElementById('installBtn').hidden = false; });
document.getElementById('installBtn').addEventListener('click', async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  await deferredPrompt.userChoice;
  deferredPrompt = null;
  document.getElementById('installBtn').hidden = true;
});

/* ── Init ────────────────────────────────────────── */
renderNotes();
renderVillages();
initMap();

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('/sw.js').catch(() => {}));
}
</script>
</body>
</html>
