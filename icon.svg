<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="20" fill="#bf7e1a"/>
  <!-- Outer ring: people in a circle (the 牽手舞 formation) -->
  <circle cx="50" cy="17" r="4" fill="#f5d490"/>
  <circle cx="69" cy="23" r="4" fill="#f5d490"/>
  <circle cx="81" cy="40" r="4" fill="#f5d490"/>
  <circle cx="81" cy="60" r="4" fill="#f5d490"/>
  <circle cx="69" cy="77" r="4" fill="#f5d490"/>
  <circle cx="50" cy="83" r="4" fill="#f5d490"/>
  <circle cx="31" cy="77" r="4" fill="#f5d490"/>
  <circle cx="19" cy="60" r="4" fill="#f5d490"/>
  <circle cx="19" cy="40" r="4" fill="#f5d490"/>
  <circle cx="31" cy="23" r="4" fill="#f5d490"/>
  <!-- Inner rings -->
  <circle cx="50" cy="50" r="22" fill="none" stroke="#f5d490" stroke-width="2.5" stroke-dasharray="none"/>
  <circle cx="50" cy="50" r="10" fill="none" stroke="#f5d490" stroke-width="2.5"/>
  <!-- Centre -->
  <circle cx="50" cy="50" r="4" fill="#f5d490"/>
</svg>
